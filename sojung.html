<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소정이 생일 가챠</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes rainbow {
            0% { color: #ff0000; }
            20% { color: #ff8800; }
            40% { color: #ffff00; }
            60% { color: #00ff00; }
            80% { color: #0000ff; }
            100% { color: #ff00ff; }
        }

        .capsule-shake {
            animation: shake 0.2s infinite;
        }

        .super-glow {
            box-shadow: 0 0 50px 20px rgba(255, 255, 255, 0.9), 0 0 100px 40px rgba(255, 215, 0, 0.6);
            border: 5px solid gold;
        }

        .retry-glow {
            box-shadow: 0 0 30px 10px rgba(156, 163, 175, 0.5);
            border: 5px solid #9ca3af;
        }

        .rainbow-text {
            animation: rainbow 1s linear infinite;
        }

        .gacha-dome {
            width: 220px;
            height: 200px;
            background: rgba(255, 255, 255, 0.2);
            border: 4px solid #ffffff;
            border-radius: 110px 110px 20px 20px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        .capsule {
            position: absolute;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: inset -3px -3px 5px rgba(0,0,0,0.2), 2px 2px 5px rgba(0,0,0,0.1);
        }

        .machine-body {
            width: 240px;
            height: 160px;
            background: #f43f5e;
            border-radius: 20px;
            position: relative;
            box-shadow: inset 0 -10px 0 rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.2);
        }

        .crank {
            width: 70px;
            height: 70px;
            background: #f8fafc;
            border-radius: 50%;
            border: 6px solid #e2e8f0;
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            z-index: 10;
        }

        .crank-handle {
            width: 6px;
            height: 35px;
            background: #94a3b8;
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: top center;
            transform: translate(-50%, 0);
        }

        .rotating {
            animation: rotateCrank 0.4s linear infinite;
        }

        @keyframes rotateCrank {
            from { transform: translateX(-50%) rotate(0deg); }
            to { transform: translateX(-50%) rotate(360deg); }
        }

        .result-shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="bg-gradient-to-tr from-rose-400 via-fuchsia-500 to-indigo-600 min-h-screen flex items-center justify-center p-4 overflow-hidden">

    <div class="max-w-md w-full flex flex-col items-center z-10">
        <div class="text-center mb-8">
            <h1 class="text-5xl font-black text-white drop-shadow-[0_5px_15px_rgba(0,0,0,0.3)] mb-3 italic uppercase">소정이 생축</h1>
            <p class="text-white font-bold bg-black/20 px-6 py-2 rounded-full inline-block backdrop-blur-sm">소정이를 위한 특별한 가챠 타임!</p>
        </div>

        <div class="flex flex-col items-center drop-shadow-2xl">
            <div id="dome" class="gacha-dome flex items-end justify-center pb-2"></div>
            <div class="machine-body flex flex-col items-center">
                <div id="crank-container" class="crank transition-all shadow-lg">
                    <div class="crank-handle"></div>
                </div>
                <div class="absolute bottom-4 w-20 h-14 bg-gray-900 rounded-t-xl border-b-4 border-gray-800 flex items-center justify-center">
                    <div class="w-12 h-1 bg-gray-700 rounded-full mb-4"></div>
                </div>
            </div>
        </div>

        <button id="draw-btn" onclick="startGacha()" class="mt-10 w-72 bg-yellow-400 hover:bg-yellow-300 text-rose-600 font-black py-5 rounded-2xl text-3xl shadow-[0_10px_0_rgb(202,138,4)] transition-all active:translate-y-2 active:shadow-none uppercase tracking-tighter">
            소정이 메렁
        </button>
    </div>

    <div id="result-overlay" class="fixed inset-0 bg-white/40 backdrop-blur-xl z-50 hidden flex flex-col items-center justify-center p-6">
        <div id="result-card" class="bg-white rounded-[3rem] p-10 max-w-sm w-full text-center transform scale-0 transition-all duration-700 relative overflow-hidden">
            <div class="result-shimmer absolute inset-0 opacity-30 pointer-events-none"></div>
            <div id="result-header" class="text-indigo-600 font-black text-xl mb-1 tracking-widest uppercase italic">소정아 생일 축하해!</div>
            <h2 id="result-title" class="text-4xl font-black mb-6 rainbow-text uppercase tracking-tighter">Happy Birthday</h2>
            
            <div id="result-icon" class="text-8xl mb-6 drop-shadow-2xl scale-110">🎁</div>
            <div id="result-name" class="text-3xl font-black text-gray-900 mb-10 leading-tight">선물 이름</div>
            
            <button id="result-btn" onclick="closeResult()" class="w-full bg-indigo-600 text-white py-5 rounded-3xl font-black text-2xl shadow-xl active:scale-95 transition-transform hover:bg-indigo-700">
                선물 받기 💖
            </button>
        </div>
    </div>

    <script>
        const prizes = [
            { name: '마녀 오르골', icon: '🔮', isRetry: false },
            { name: '우사기 여행', icon: '🐰', isRetry: false },
            { name: '라이즈 핸드 + 공차', icon: '🍹', isRetry: false },
            { name: '헤어퍼퓸', icon: '✨', isRetry: false },
            { name: '말차롤', icon: '🍵', isRetry: false },
            { name: '한교동', icon: '🐟', isRetry: false },
            { name: '(꽝 retry)', icon: '💨', isRetry: true }
        ];

        const capsuleColors = ['bg-rose-400', 'bg-sky-400', 'bg-amber-400', 'bg-emerald-400', 'bg-violet-400', 'bg-orange-400'];
        const dome = document.getElementById('dome');

        function createCapsules() {
            dome.innerHTML = '';
            for (let i = 0; i < 24; i++) {
                const capsule = document.createElement('div');
                const color = capsuleColors[Math.floor(Math.random() * capsuleColors.length)];
                capsule.className = `capsule ${color} border-2 border-white/30`;
                const left = Math.random() * 170 + 5;
                const bottom = Math.random() * 120;
                capsule.style.left = `${left}px`;
                capsule.style.bottom = `${bottom}px`;
                capsule.style.transform = `rotate(${Math.random() * 360}deg)`;
                capsule.innerHTML = '<div class="absolute top-1 left-1 w-2 h-2 bg-white/40 rounded-full"></div>';
                dome.appendChild(capsule);
            }
        }

        window.onload = createCapsules;

        function startGacha() {
            const btn = document.getElementById('draw-btn');
            const crank = document.getElementById('crank-container');
            const capsules = document.querySelectorAll('.capsule');
            
            btn.disabled = true;
            btn.classList.add('opacity-50');
            crank.classList.add('rotating');

            capsules.forEach(cap => {
                cap.classList.add('capsule-shake');
                const interval = setInterval(() => {
                    cap.style.bottom = `${Math.random() * 140 + 20}px`;
                    cap.style.left = `${Math.random() * 170 + 10}px`;
                    cap.style.transform = `rotate(${Math.random() * 720}deg)`;
                }, 100);
                setTimeout(() => clearInterval(interval), 2500);
            });

            document.body.classList.add('capsule-shake');

            setTimeout(() => {
                crank.classList.remove('rotating');
                document.body.classList.remove('capsule-shake');
                const result = prizes[Math.floor(Math.random() * prizes.length)];
                showResult(result);
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }, 2500);
        }

        function showResult(prize) {
            const overlay = document.getElementById('result-overlay');
            const card = document.getElementById('result-card');
            const header = document.getElementById('result-header');
            const title = document.getElementById('result-title');
            const icon = document.getElementById('result-icon');
            const name = document.getElementById('result-name');
            const resBtn = document.getElementById('result-btn');

            icon.innerText = prize.icon;
            name.innerText = prize.name;

            if (prize.isRetry) {
                header.innerText = "OH NO... 소정아 미안!";
                header.className = "text-gray-400 font-black text-xl mb-1 tracking-widest uppercase italic";
                title.innerText = "RETRY!";
                title.className = "text-4xl font-black mb-6 text-gray-400 uppercase";
                resBtn.innerText = "다시 도전하기 🔄";
                resBtn.className = "w-full bg-gray-600 text-white py-5 rounded-3xl font-black text-2xl shadow-xl active:scale-95 transition-transform hover:bg-gray-700";
                card.classList.remove('super-glow');
                card.classList.add('retry-glow');
            } else {
                header.innerText = "소정아 생일 축하해!";
                header.className = "text-indigo-600 font-black text-xl mb-1 tracking-widest uppercase italic";
                title.innerText = "Happy Birthday";
                title.className = "text-4xl font-black mb-6 rainbow-text uppercase tracking-tighter";
                resBtn.innerText = "선물 받기 💖";
                resBtn.className = "w-full bg-indigo-600 text-white py-5 rounded-3xl font-black text-2xl shadow-xl active:scale-95 transition-transform hover:bg-indigo-700";
                card.classList.remove('retry-glow');
                card.classList.add('super-glow');
            }

            overlay.classList.remove('hidden');
            setTimeout(() => {
                card.classList.remove('scale-0');
                card.classList.add('scale-100');
            }, 100);
        }

        function closeResult() {
            const overlay = document.getElementById('result-overlay');
            const card = document.getElementById('result-card');
            card.classList.remove('scale-100');
            card.classList.add('scale-0');
            setTimeout(() => {
                overlay.classList.add('hidden');
                createCapsules();
            }, 300);
        }
    </script>
</body>
</html>
